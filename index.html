<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HS Service Team – Links</title>
  <style>
    :root {
      --bg-1: #10151a;
      --bg-2: #1a232c;
      --card: #ffffff;
      --card-border: #e9e9e9;
      --text: #2f2f2f;
      --muted: #6f6f6f;
      --accent: #d84f22;
      --accent-hover: #c8451f;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(216, 79, 34, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 34px);
      line-height: 1.1;
      color: var(--text);
    }

    .subtitle {
      margin: 10px 0 28px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 17px;
      padding: 18px 20px;
      border-radius: 18px;
      background: var(--accent);
      border: 1px solid var(--accent);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      transform: translateY(-2px);
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      outline: none;
    }

    .icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      flex: 0 0 28px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 14px;
      font-weight: 700;
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px 20px;
        border-radius: 22px;
      }

      .link-btn {
        font-size: 16px;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="card">
      <h1>HS Service Team GmbH</h1>
      <p class="subtitle">Hier finden Sie unsere wichtigsten Social-Media-Links</p>
      <div class="links">
        <a class="link-btn" href="https://www.facebook.com/profile.php?id=100057498098043" target="_blank" rel="noopener noreferrer">
          <span class="icon">f</span>
          <span>Facebook</span>
        </a>
        <a class="link-btn" href="https://www.instagram.com/hs_serviceteam_gmbh/" target="_blank" rel="noopener noreferrer">
          <span class="icon">◎</span>
          <span>Instagram</span>
        </a>
      </div>
      <p class="footer">© 2026 - HS Service Team GmbH</p>
    </section>
  </main>
</body>
</html>
